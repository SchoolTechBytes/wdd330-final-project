<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Roster | The Wandering Quill Tavern</title>
    <meta name="description"
      content="View and manage your D&D 5e party roster with The Wandering Quill Tavern.">
    <meta name="author" content="Nicholas Nixon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap"
      rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/party.css">

    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#party-roster">Skip to main content</a>
    <header class="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a class="nav-logo" href="index.html">The Wandering Quill Tavern</a>
        <ul class="nav-links" role="list">
          <li><a href="index.html" class="nav-link">Builder</a></li>
          <li><a href="party.html" class="nav-link nav-link--active"
              aria-current="page">Party</a></li>
          <li><a href="reference.html" class="nav-link">Reference</a></li>
        </ul>
      </nav>
    </header>

    <main id="party-roster" tabindex="-1">
      <div class="roster-controls">
        <a href="index.html" class="btn btn--primary">+ Add Character</a>
        <button class="btn btn--ghost" id="clear-party-btn" type="button">Clear Party</button>
        <button class="btn btn--ghost" id="summary-view-btn" type="button">Summary View</button>
        <button class="btn btn--ghost" id="export-btn" type="button">Export</button>
        <button class="btn btn--ghost" id="load-btn" type="button">Load</button>
        <input type="file" id="party-file-input" accept=".json" hidden aria-hidden="true">
      </div>
      <section class="party-grid" aria-label="Party roster"></section>
      <section class="party-summary" id="party-summary" hidden aria-label="Party summary table">
        <table class="summary-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Class</th>
              <th>Race</th>
              <th>Level</th>
              <th>STR</th>
              <th>DEX</th>
              <th>CON</th>
              <th>INT</th>
              <th>WIS</th>
              <th>CHA</th>
              <th>HP</th>
              <th>AC</th>
            </tr>
          </thead>
          <tbody class="summary-table__body"></tbody>
        </table>
      </section>
    </main>

    <template id="party-member-card">
      <article class="char-card card card-enter">
        <header class="char-card__header">
          <h2 class="char-card__name"></h2>
          <div class="char-card__badges">
            <span class="badge char-card__class"></span>
            <span class="badge char-card__race"></span>
            <span class="badge char-card__level"></span>
          </div>
        </header>

        <div class="char-card__hit-die">
          <span class="char-card__hit-die-label">Hit Die</span>
          <span class="char-card__hit-die-value"></span>
        </div>

        <div class="char-card__scores">
          <div class="char-score" data-ability="str">
            <span class="char-score__label">STR</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
          <div class="char-score" data-ability="dex">
            <span class="char-score__label">DEX</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
          <div class="char-score" data-ability="con">
            <span class="char-score__label">CON</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
          <div class="char-score" data-ability="int">
            <span class="char-score__label">INT</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
          <div class="char-score" data-ability="wis">
            <span class="char-score__label">WIS</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
          <div class="char-score" data-ability="cha">
            <span class="char-score__label">CHA</span>
            <span class="char-score__value"></span>
            <span class="char-score__mod"></span>
          </div>
        </div>

        <div class="char-card__section">
          <h3 class="char-card__section-title">Saving Throws</h3>
          <ul class="char-card__list char-card__saves-list"></ul>
        </div>

        <div class="char-card__section">
          <h3 class="char-card__section-title">Proficiencies</h3>
          <ul class="char-card__list char-card__profs-list"></ul>
        </div>

        <span class="badge char-card__spellcaster" hidden>Spellcaster</span>

        <button class="btn btn--danger char-card__remove" type="button"
          aria-label="Remove character from party">Remove</button>
      </article>
    </template>

  </body>
</html>
